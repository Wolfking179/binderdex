<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101a36" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BinderDex" />
  <meta name="description" content="Dein privater Pokémon-Kartenbinder mit Wunschliste und Marktpreisen." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>BinderDex</title>
</head>
<body>
  <div class="app-bg" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="grid-glow"></span>
  </div>

  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="backButton" class="icon-button hidden" aria-label="Zurück">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="brand-wrap">
        <div class="brand-mark" aria-hidden="true"><span></span></div>
        <div>
          <p class="eyebrow">PRIVATE COLLECTION</p>
          <h1 id="screenTitle">BinderDex</h1>
        </div>
      </div>
      <button id="syncButton" class="icon-button" aria-label="Preise aktualisieren" title="Preise aktualisieren">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5"/></svg>
      </button>
    </header>

    <main id="mainContent" class="main-content" tabindex="-1"></main>

    <nav id="bottomNav" class="bottom-nav" aria-label="Hauptnavigation">
      <button class="nav-item active" data-route="binder">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H6.5A2.5 2.5 0 0 0 4 21.5v-16zM4 18.5A2.5 2.5 0 0 1 6.5 16H20"/></svg>
        <span>Binder</span>
      </button>
      <button class="nav-item" data-route="search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <span>Suchen</span>
      </button>
      <button class="nav-item" data-route="wishlist">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        <span>Wunschliste</span>
      </button>
      <button class="nav-item" data-route="settings">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9A1.7 1.7 0 0 0 21 10h.2v4H21a1.7 1.7 0 0 0-1.6 1z"/></svg>
        <span>Mehr</span>
      </button>
    </nav>
  </div>

  <div id="modalRoot" class="modal-root" aria-live="polite"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <template id="emptyStateTemplate">
    <section class="empty-state">
      <div class="empty-icon"><span></span></div>
      <h2></h2>
      <p></p>
      <button class="primary-button"></button>
    </section>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
